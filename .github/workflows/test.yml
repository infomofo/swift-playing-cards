name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: macos-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install SwiftLint
        run: |
          brew install swiftlint
          swiftlint version
      
      - name: Install swift-format
        run: |
          brew install swift-format
          swift-format --version
      
      - name: Lint with SwiftLint
        run: make lint
      
      - name: Check formatting with swift-format
        run: make format-check
  
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build package
        run: make build
      
      - name: Run tests
        run: make test
