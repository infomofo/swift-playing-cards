name: Swift Test & Visual Snapshot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9'
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Generate DisplayCard Image
        run: |
          swift run PlayingCardTests --generate-card-image
      - name: Upload DisplayCard Image
        uses: actions/upload-artifact@v4
        with:
          name: DisplayCardSnapshot
          path: Tests/PlayingCardTests/DisplayCardSnapshot.png
