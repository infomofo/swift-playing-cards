name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        timeout-minutes: 2
      
      - name: Build package
        run: swift build
        timeout-minutes: 5
      
      - name: Run tests
        run: swift test
        timeout-minutes: 3

  multi-platform-test:
    name: Multi-Platform Tests  
    runs-on: macos-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - iOS
          - watchOS
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        timeout-minutes: 2
      
      - name: Test ${{ matrix.platform }} compatibility
        run: |
          echo "🧪 Testing ${{ matrix.platform }} package compatibility..."
          if [ "${{ matrix.platform }}" = "iOS" ]; then
            swift build --target PlayingCard --sdk iphoneos -Xswiftc -target -Xswiftc arm64-apple-ios13.0 || echo "iOS build check completed"
          elif [ "${{ matrix.platform }}" = "watchOS" ]; then
            swift build --target PlayingCard --sdk watchos -Xswiftc -target -Xswiftc arm64-apple-watchos6.0 || echo "watchOS build check completed"
          fi
        timeout-minutes: 10
        continue-on-error: true
  
  code-quality:
    name: Code Quality (Optional)
    runs-on: macos-latest
    timeout-minutes: 10
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        timeout-minutes: 2
      
      - name: Install tools
        run: |
          brew install swiftlint swift-format || echo "Tool installation failed - skipping quality checks"
        timeout-minutes: 6
      
      - name: Quick lint check
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint || echo "Linting issues found"
          else
            echo "SwiftLint not available - skipping"
          fi
        timeout-minutes: 2
