name: PR Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-gate:
    name: PR Gate
    runs-on: macos-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        timeout-minutes: 2
      
      - name: Quick build test
        run: |
          echo "🏗️ Testing build..."
          swift build
          echo "✅ Build successful"
        timeout-minutes: 5
      
      - name: Quick test run
        run: |
          echo "🧪 Running tests..."
          swift test
          echo "✅ Tests passed"
        timeout-minutes: 3
      
      - name: Comment on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **PR Quality Check Passed**\n\nBuild and tests completed successfully!'
            })
      
      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **PR Quality Check Failed**\n\nPlease run these commands locally to fix issues:\n- `swift build` - Check build\n- `swift test` - Run tests\n\nOnce fixed, push changes to update this PR.'
            })