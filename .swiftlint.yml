# SwiftLint Configuration
# Simplified and reliable configuration focused on essential code quality

# Included paths
included:
  - Sources
  - Tests

# Disabled rules that are often problematic or overly strict
disabled_rules:
  - todo
  - line_length  # We'll configure this below instead

# Enable only essential opt-in rules that are stable and widely used
opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicit_getter
  - redundant_optional_initialization

# Rule configurations
line_length:
  warning: 120
  error: 200  # More lenient error threshold

file_length:
  warning: 400
  error: 600  # More reasonable limits

function_body_length:
  warning: 40
  error: 80  # More reasonable limits

# Exclude specific files if needed
excluded:
  - .build
  - Package.swift